name: docflow
description: DocFlow — premium document conversion.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.2.0
  dio: ^5.7.0
  file_picker: ^11.0.2
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.1.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.3
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  riverpod_annotation: ^4.0.0
  share_plus: ^12.0.2
  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  hive_ce_generator: ^1.9.2

flutter:
  uses-material-design: true
  assets:
    - .env
    - lib/assets/
