name: docflow
description: DocFlow — premium document conversion.
publish_to: "none"
version: 1.0.0+1

# NOTE: Versions below are pinned (no ^) to versions current as of training.
# Flutter 3.41.6 / Dart 3.11.4 are forward-targets; verify each pin on pub.dev
# if a constraint solver error appears during `flutter pub get`.

environment:
  sdk: ">=3.11.4 <4.0.0"
  flutter: ">=3.41.6"

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.2.0
  dio: ^5.10.0
  file_picker: ^12.0.0-beta.7
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.1.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  hive_ce: ^2.0.0
  hive_ce_flutter: ^2.0.0
  intl: ^0.20.3
  path: 1.9.1
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  riverpod_annotation: ^4.0.0
  share_plus: ^13.2.0
  cupertino_icons: ^1.0.9
  firebase_core: ^4.12.0
  firebase_auth: ^6.5.5
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  hive_ce_generator: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
